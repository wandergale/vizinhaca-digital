<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Cadastro e Agendamento de Ações Comunitárias</title>
  <link rel="stylesheet" href="../css/autenticacao.css">
  <script src="../js/autenticacao.js" defer></script>
</head>
<body>
  <div class="container">
    <h2>Sistema de Cadastro e Agendamento de Ações Comunitárias</h2>
    
    <div class="tabs">
      <button class="tab active" onclick="mostrarLogin()">Login</button>
      <button class="tab" onclick="mostrarCadastro()">Criar Conta</button>
    </div>

    <div class="icon">
      <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Usuário" width="80">
    </div>

    <form id="formLogin" class="form ativo">
      <label for="emailLogin">Email/Usuário</label>
      <input type="text" id="emailLogin" placeholder="Digite seu e-mail ou usuário" required>

      <label for="senhaLogin">Senha</label>
      <input type="password" id="senhaLogin" placeholder="Digite a senha" required minlength="6">

      <a href="#" class="link" id="linkRecuperacao">Esqueci minha senha</a>
      <a href="#" class="link" id="linkAlterarSenha">Alterar minha senha</a>

      <button type="submit">Fazer Login</button>
      <p id="mensagemLogin"></p>
    </form>

    <form id="formCadastro" class="form">
      <label for="emailCadastro">Email/Usuário</label>
      <input type="text" id="emailCadastro" placeholder="Digite seu e-mail ou usuário" required>

      <label for="senhaCadastro">Senha</label>
      <input type="password" id="senhaCadastro" placeholder="Digite a senha" required minlength="6">

      <label for="confirmarSenha">Confirmar Senha</label>
      <input type="password" id="confirmarSenha" placeholder="Confirme a senha" required minlength="6">

      <button type="submit">Criar Conta</button>
      <p id="mensagemCadastro"></p>
    </form>

    <form id="formRecuperacao" class="form">
      <h3>Esqueceu sua Senha?</h3>
      <p>Informe seu e-mail cadastrado e enviaremos um link para criar uma nova senha.</p>

      <label for="emailRecuperacao">Seu e-mail</label>
      <input type="email" id="emailRecuperacao" placeholder="Digite seu e-mail" required>

      <button type="submit">Enviar Link de Recuperação →</button>
      <p id="mensagemRecuperacao"></p>
    </form>


    <form id="formAlterarSenha" class="form">
      <h3>Alterar Senha</h3>

      <label for="senhaAtual">Senha atual</label>
      <input type="password" id="senhaAtual" placeholder="Digite a senha atual" required minlength="6">

      <label for="novaSenha">Nova senha</label>
      <input type="password" id="novaSenha" placeholder="Digite a nova senha" required minlength="6">

      <label for="confirmarNovaSenha">Confirmar nova senha</label>
      <input type="password" id="confirmarNovaSenha" placeholder="Confirme a nova senha" required minlength="6">

      <button type="submit">Salvar alterações</button>
      <p id="mensagemAlteracao"></p>
    </form>
  </div>

  <div id="confirmacao" class="modal">
    <div class="modal-content">
      <span class="checkmark">✔</span>
      <p id="textoConfirmacao"></p>
      <button onclick="fecharConfirmacao()">OK</button>
    </div>
  </div>
</body>
</html>
