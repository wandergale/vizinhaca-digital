<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Ações</title>
  <link rel="stylesheet" href="../css/cadastro-acoes.css">
  <script src="../js/cadastro-acoes.js" defer></script>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>Sistema de Cadastro e Agendamento de Ações Comunitárias</h2>
      <ul>
        <li>Início</li>
        <li>Administração</li>
        <li>Períodos</li>
        <li>Agendamentos</li>
        <li>Ações</li>
        <li>Sair</li>
      </ul>
    </aside>

    <main class="content">
      <h2>Cadastro de Ações</h2>
      <div class="acoes-header">
        <button class="btn-nova">+ Nova Ação</button>
        <button class="btn-filtros">Filtros</button>
      </div>

      <table class="tabela-acoes">
        <thead>
          <tr>
            <th>Título</th>
            <th>Descrição</th>
            <th>Data</th>
            <th>Local</th>
            <th>Prioridade</th>
          </tr>
        </thead>
        <tbody id="listaAcoes">
          <tr>
            <td>Ação 1</td>
            <td>Reunião</td>
            <td>01/01/2026</td>
            <td>Área Verde</td>
            <td>Média</td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>

  <div id="modalNovaAcao" class="modal">
    <div class="modal-content">
      <h3>Cadastrar Nova Ação</h3>
      <form id="formNovaAcao">
        <label>Título da ação*</label>
        <input type="text" id="titulo" placeholder="Digite o nome da ação">

        <label>Descrição*</label>
        <textarea id="descricao" placeholder="Detalhe a ação"></textarea>

        <label>Data*</label>
        <input type="datetime-local" id="data">

        <label>Local*</label>
        <input type="text" id="local" placeholder="Digite o endereço ou ponto de encontro">

        <label>Prioridade*</label>
        <select id="prioridade">
          <option value="">Selecione</option>
          <option value="Alta">Alta</option>
          <option value="Média">Média</option>
          <option value="Baixa">Baixa</option>
        </select>

        <div class="form-buttons">
          <button type="submit" class="btn-salvar">Salvar ação</button>
          <button type="button" class="btn-cancelar">Cancelar</button>
        </div>
        <p id="mensagem" class="mensagem"></p>
      </form>
    </div>
  </div>
</body>
</html>
